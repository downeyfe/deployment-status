<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deployment Status — Login</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    h1 { font-size: 1.1rem; font-weight: 600; }
    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    label { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }
    input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.55rem 0.75rem;
      color: var(--text);
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      padding: 0.6rem;
      background: var(--accent);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .error {
      font-size: 0.82rem;
      color: var(--red);
      display: none;
    }
    .error.visible { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Deployment Status</h1>
    <form method="POST" action="/login">
      <div style="display:flex;flex-direction:column;gap:0.85rem">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required autofocus />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <p class="error" id="error-msg">Incorrect username or password.</p>
        <button class="btn" type="submit">Sign in</button>
      </div>
    </form>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('error-msg').classList.add('visible');
    }
  </script>
</body>
</html>
